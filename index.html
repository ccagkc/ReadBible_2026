<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>葵涌堂 2026年讀經計劃 (雲端版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'serif': ['"Noto Serif TC"', 'serif'],
                        'sans': ['"Noto Sans TC"', 'sans-serif'],
                    },
                    colors: {
                        nature: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534' }
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-nature-50 text-gray-800 font-sans antialiased min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        /** ⚙️ 行政人員設定區 **/
        const SPREADSHEET_ID = '1HLCf500XATePsBxyw1OOyr_gSCMsIGNOvcXaGemn_Vs'; 
        const SHEET_NAME = 'ReadBible';
        
        const START_DATE = new Date(2026, 5, 1); 
        const END_DATE = new Date(2026, 9, 31);

        const formatDate = (date) => {
            const d = new Date(date);
            return [d.getFullYear(), (''+(d.getMonth()+1)).padStart(2,'0'), (''+d.getDate()).padStart(2,'0')].join('-');
        };

        const isWeekend = (date) => (date.getDay() === 0 || date.getDay() === 6);

        const parseExternalLink = (url, type = 'audio') => {
            if (!url || typeof url !== 'string' || !url.includes('google.com')) return { type: 'raw', url };
            const idMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (!idMatch) return { type: 'raw', url };
            
            const id = idMatch[1];
            if (type === 'audio') {
                return { type: 'embed', url: `https://drive.google.com/file/d/${id}/preview` };
            } else {
                return { type: 'embed', url: `https://docs.google.com/document/d/${id}/preview` };
            }
        };

        const parseCSV = (str) => {
            const arr = [];
            let quote = false;
            for (let row = 0, col = 0, c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || "";
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        };

        const App = () => {
            const [view, setView] = useState('calendar');
            const [selectedDate, setSelectedDate] = useState(null);
            const [data, setData] = useState({});
            const [completed, setCompleted] = useState([]);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);
            
            const [showAnswer, setShowAnswer] = useState(false);

            const validDates = useMemo(() => {
                const res = [];
                let cur = new Date(START_DATE);
                while (cur <= END_DATE) {
                    if (!isWeekend(cur)) res.push(formatDate(cur));
                    cur.setDate(cur.getDate() + 1);
                }
                return res;
            }, []);

            const generateCalendarGrid = (year, month) => {
                const first = new Date(year, month, 1);
                const last = new Date(year, month + 1, 0);
                let grid = [], week = new Array(7).fill(null);
                for (let i = 0; i < first.getDay(); i++) week[i] = null;
                for (let d = 1; d <= last.getDate(); d++) {
                    const cur = new Date(year, month, d);
                    week[cur.getDay()] = cur;
                    if (cur.getDay() === 6 || d === last.getDate()) {
                        grid.push(week);
                        week = new Array(7).fill(null);
                    }
                }
                return grid;
            };

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('kc-bible-2026');
                    if (saved) setCompleted(JSON.parse(saved));
                } catch (e) { }

                const fetchData = async () => {
                    try {
                        const csvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
                        const resp = await fetch(csvUrl);
                        const text = await resp.text();
                        
                        const rows = parseCSV(text);
                        const headers = rows[0].map(h => h.trim());
                        const items = {};
                        
                        for(let i=1; i<rows.length; i++) {
                            const row = rows[i];
                            if (!row || row.length < 2) continue;
                            const item = {};
                            headers.forEach((h, idx) => item[h] = row[idx]);
                            
                            if(item['日期']) {
                                const dateParts = item['日期'].split(/[-/]/);
                                let d;
                                if(dateParts.length === 3) {
                                    d = new Date(dateParts[0], dateParts[1]-1, dateParts[2]);
                                } else {
                                    d = new Date(item['日期']);
                                }
                                if(!isNaN(d)) items[formatDate(d)] = item;
                            }
                        }
                        setData(items);
                    } catch (e) {
                        console.error("資料載入失敗:", e);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);
                        
            const toggleFinish = (d) => {
                try {
                    const next = completed.includes(d) ? completed.filter(x => x!==d) : [...completed, d];
                    setCompleted(next);
                    localStorage.setItem('kc-bible-2026', JSON.stringify(next));
                } catch(e) {
                    alert("瀏覽器隱私設定阻止了進度儲存。");
                }
            };

            const navigate = (dir) => {
                const idx = validDates.indexOf(selectedDate);
                if (dir === 'p' && idx > 0) setSelectedDate(validDates[idx-1]);
                if (dir === 'n' && idx < validDates.length - 1) setSelectedDate(validDates[idx+1]);
                
                setShowAnswer(false); 
                window.scrollTo(0,0);
            };

            // === 整理當日資料 (優化 Babel 編譯) ===
            const currentData = data[selectedDate] || {};
            const audioInfo = currentData['語音連結'] ? parseExternalLink(currentData['語音連結'], 'audio') : null;
            const scriptInfo = currentData['經文'] ? parseExternalLink(currentData['經文'], 'doc') : null;
            const questionInfo = currentData['問題'] ? parseExternalLink(currentData['問題'], 'doc') : null;
            const answerInfo = currentData['答案'] ? parseExternalLink(currentData['答案'], 'doc') : null;

            if (loading) return (
                <div className="flex flex-col items-center justify-center h-screen text-nature-600 bg-nature-50">
                    <i className="fa-solid fa-leaf fa-spin text-5xl mb-4"></i>
                    <p className="font-medium animate-pulse mt-4">正在開啟聖經閱讀日曆...</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    {/* 頁頭 */}
                    <header className="bg-gradient-to-br from-nature-800 to-nature-600 text-white py-10 px-4 shadow-xl text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                            <i className="fa-solid fa-seedling text-[15rem] -ml-10 -mt-10"></i>
                        </div>
                        <h1 className="text-3xl md:text-5xl font-bold mb-2 relative z-10 tracking-tight">剛強壯膽.踐信力行</h1>
                        <h1 className="text-3xl md:text-5xl font-bold mb-2 relative z-10 tracking-tight">葵涌堂 2026年 讀經計劃</h1>
                        <p className="text-xl md:text-2xl font-serif italic text-nature-200 mb-4 relative z-10 mt-4">哥林多前後書、提摩太前後書、提多書</p>
                        <p className="text-nature-100 opacity-90 relative z-10 font-medium">每週星期一至五 · 同讀聖言行真道</p>
                    </header>

                    <main className="flex-grow py-8 px-4 bg-nature-50/30">
                        {view === 'calendar' ? (
                            /* 月曆視圖 */
                            <div className="max-w-4xl mx-auto space-y-8">
                                {[5,6,7,8,9].map(m => (
                                    <section key={m} className="bg-white rounded-3xl shadow-sm border border-nature-100 overflow-hidden">
                                        <div className="bg-nature-600 text-white py-3 text-center font-bold text-lg tracking-widest">2026年 {m+1}月</div>
                                        <div className="p-4 grid grid-cols-7 gap-2">
                                            {['日','一','二','三','四','五','六'].map(d => <div key={d} className="text-center text-gray-400 text-[10px] font-bold py-1 uppercase">{d}</div>)}
                                            {generateCalendarGrid(2026, m).map((w, wi) => w.map((d, di) => {
                                                if(!d) return <div key={`${wi}-${di}`}></div>;
                                                const ds = formatDate(d);
                                                const isPlan = validDates.includes(ds);
                                                const isDone = completed.includes(ds);
                                                const hasData = !!data[ds];
                                                
                                                return (
                                                    <button 
                                                        key={ds}
                                                        disabled={!isPlan}
                                                        onClick={() => { 
                                                            setSelectedDate(ds); 
                                                            setView('reader'); 
                                                            setShowAnswer(false);
                                                        }}
                                                        className={`h-12 md:h-16 rounded-xl flex flex-col items-center justify-center transition-all ${
                                                            !isPlan ? 'bg-gray-50 text-gray-200 cursor-not-allowed' :
                                                            isDone ? 'bg-nature-100 text-nature-700 border-2 border-nature-500 font-bold' :
                                                            hasData ? 'bg-white border border-gray-200 hover:border-nature-500 hover:shadow-sm text-gray-800' :
                                                            'bg-white border border-gray-100 hover:border-nature-300 text-gray-400 opacity-60'
                                                        }`}
                                                        title={hasData ? '點擊閱讀' : '當日尚未有資料'}
                                                    >
                                                        <span className="text-base">{d.getDate()}</span>
                                                        {isDone && <i className="fa-solid fa-check-circle text-[10px] mt-0.5"></i>}
                                                    </button>
                                                );
                                            }))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        ) : (
                            /* 閱讀視圖 */
                            <div className="max-w-3xl mx-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <button onClick={()=>{ setView('calendar'); setShowAnswer(false); }} className="bg-white px-4 py-2 rounded-full border border-nature-200 text-nature-700 font-medium hover:bg-nature-50 shadow-sm flex items-center text-sm">
                                        <i className="fa-solid fa-chevron-left mr-2"></i> 返回月曆
                                    </button>
                                    <div className="text-gray-500 font-bold text-sm bg-white px-4 py-2 rounded-full shadow-sm border border-nature-50">{selectedDate}</div>
                                </div>

                                <article className="bg-white rounded-[2.5rem] shadow-2xl border border-nature-100 overflow-hidden mb-8">
                                    <div className="bg-nature-700 text-white p-8 md:p-10">
                                        <div className="flex items-center space-x-2 text-nature-300 text-sm font-bold tracking-[0.2em] mb-3">
                                            <i className="fa-solid fa-book-open-reader"></i>
                                            <span>今日內容</span>
                                        </div>
                                        <h2 className="text-3xl md:text-4xl font-serif font-bold">
                                            {currentData['經卷'] ? `${currentData['經卷']} ${currentData['章節']}` : '內容準備中'}
                                        </h2>
                                    </div>

                                    <div className="p-6 md:p-10 space-y-12">
                                        {/* 語音播放器 */}
                                        {audioInfo && (
                                            <section className="bg-nature-50/50 p-6 rounded-3xl border border-nature-100 shadow-inner">
                                                <h4 className="text-nature-800 font-bold mb-4 flex items-center text-sm">
                                                    <i className="fa-solid fa-circle-play mr-2 text-nature-600"></i> 經文朗讀
                                                </h4>
                                                {audioInfo.type === 'embed' ? (
                                                    <iframe src={audioInfo.url} className="w-full h-16 border-0 rounded-xl bg-transparent"></iframe>
                                                ) : (
                                                    <audio controls className="w-full h-10"><source src={audioInfo.url}/></audio>
                                                )}
                                            </section>
                                        )}

                                        {/* 經文內容區塊 (當有經文時才顯示) */}
                                        {currentData['經文'] && (
                                            <section>
                                                <div className="flex justify-between items-end mb-6">
                                                    <h4 className="text-nature-700 font-bold border-l-4 border-nature-500 pl-3">聖經經文</h4>
                                                    {currentData['經文'].includes('http') && (
                                                        <a href={currentData['經文']} target="_blank" className="text-xs text-nature-600 hover:underline font-bold">
                                                            <i className="fa-solid fa-up-right-from-square mr-1"></i> 全螢幕閱讀
                                                        </a>
                                                    )}
                                                </div>
                                                
                                                <div className="rounded-2xl overflow-hidden bg-gray-50 border border-gray-100 min-h-[100px]">
                                                    {scriptInfo && scriptInfo.type === 'embed' ? (
                                                        <div className="relative pt-[130%] md:pt-[100%] w-full">
                                                            <iframe src={scriptInfo.url} className="absolute inset-0 w-full h-full border-0"></iframe>
                                                        </div>
                                                    ) : (
                                                        <div className="p-6 md:p-8 text-lg md:text-xl leading-loose font-serif text-gray-800 whitespace-pre-wrap">
                                                            {currentData['經文']}
                                                        </div>
                                                    )}
                                                </div>
                                            </section>
                                        )}

                                        {/* 經文釋義 */}
                                        {currentData['釋義'] && (
                                            <section>
                                                <h4 className="text-nature-700 font-bold mb-4 border-l-4 border-nature-500 pl-3">經文釋義</h4>
                                                <div className="bg-nature-50/30 p-6 md:p-8 rounded-3xl border border-nature-50 text-gray-600 leading-loose text-base md:text-lg italic font-serif">
                                                    {currentData['釋義']}
                                                </div>
                                            </section>
                                        )}

                                        {/* 新增：反思問題與答案區塊 (當有問題時才顯示) */}
                                        {currentData['問題'] && (
                                            <section className="pt-6 border-t border-dashed border-nature-200">
                                                <div className="flex justify-between items-end mb-6">
                                                    <h4 className="text-nature-700 font-bold border-l-4 border-nature-500 pl-3">今日問題 / 查經反思</h4>
                                                </div>
                                                
                                                <div className="rounded-2xl overflow-hidden bg-white border-2 border-nature-100 min-h-[100px]">
                                                    {questionInfo && questionInfo.type === 'embed' ? (
                                                        <div className="relative pt-[130%] md:pt-[100%] w-full">
                                                            <iframe src={questionInfo.url} className="absolute inset-0 w-full h-full border-0"></iframe>
                                                        </div>
                                                    ) : (
                                                        <div className="p-6 md:p-8 text-lg md:text-xl leading-loose font-serif text-gray-800 whitespace-pre-wrap">
                                                            {currentData['問題']}
                                                        </div>
                                                    )}
                                                </div>

                                                {/* 答案按鈕與展開內容區 */}
                                                {currentData['答案'] && (
                                                    <div className="mt-6">
                                                        {!showAnswer ? (
                                                            <button 
                                                                onClick={() => setShowAnswer(true)}
