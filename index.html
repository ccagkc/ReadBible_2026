<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>葵涌堂 2026年讀經計劃 (雲端版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'serif': ['"Noto Serif TC"', 'serif'],
                        'sans': ['"Noto Sans TC"', 'sans-serif'],
                    },
                    colors: {
                        nature: { 
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 
                            500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534' 
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-nature-50 text-gray-800 font-sans antialiased min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        /** * ==========================================
         * ⚙️ 行政人員設定區 
         * ==========================================
         * 1. 請將 SPREADSHEET_ID 替換為您的 Google Sheet ID
         * 2. 確保該 Google Sheet 已經「發佈到網路」 (檔案 > 共用 > 發佈到網路 > 逗號分隔值 csv)
         */
        const SPREADSHEET_ID = '1HLCf500XATePsBxyw1OOyr_gSCMsIGNOvcXaGemn_Vs'; // 請替換為您教會真實的試算表 ID
        const SHEET_NAME = '工作表1'; // 如果您的試算表第一頁名稱不同，請在此修改
        
        // 讀經計劃日期範圍
        const START_DATE = new Date(2026, 5, 1);  // 2026年6月1日 (月份從 0 開始算，5代表6月)
        const END_DATE = new Date(2026, 9, 31);   // 2026年10月31日

        // --- 工具函數區 ---
        
        // 將日期轉換為 YYYY-MM-DD 格式
        const formatDate = (date) => {
            const d = new Date(date);
            return [
                d.getFullYear(), 
                (''+(d.getMonth()+1)).padStart(2,'0'), 
                (''+d.getDate()).padStart(2,'0')
            ].join('-');
        };

        // 判斷是否為週末 (0=星期日, 6=星期六)
        const isWeekend = (date) => (date.getDay() === 0 || date.getDay() === 6);

        // 解析 Google Drive 連結或普通網址
        const parseExternalLink = (url, type = 'audio') => {
            if (!url) return null;
            if (!url.includes('google.com')) return { type: 'raw', url };
            
            // 抓取 Google 的檔案 ID
            const idMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (!idMatch) return { type: 'raw', url };
            
            const id = idMatch[1];
            if (type === 'audio') {
                return { type: 'embed', url: `https://drive.google.com/file/d/${id}/preview` };
            } else {
                return { type: 'embed', url: `https://docs.google.com/document/d/${id}/preview?authuser=0` };
            }
        };

        // 產生月曆的網格資料
        const generateCalendarGrid = (year, month) => {
            const first = new Date(year, month, 1);
            const last = new Date(year, month + 1, 0);
            let grid = [], week = new Array(7).fill(null);
            
            // 填補月初的空白
            for (let i = 0; i < first.getDay(); i++) week[i] = null;
            
            for (let d = 1; d <= last.getDate(); d++) {
                const cur = new Date(year, month, d);
                week[cur.getDay()] = cur;
                
                // 週末或月底時換行
                if (cur.getDay() === 6 || d === last.getDate()) {
                    grid.push(week);
                    week = new Array(7).fill(null);
                }
            }
            return grid;
        };

        // --- 主程式組件 ---
        const App = () => {
            const [view, setView] = useState('calendar'); // 狀態：月曆模式 (calendar) 或 閱讀模式 (reader)
            const [selectedDate, setSelectedDate] = useState(null);
            const [data, setData] = useState({});
            const [completed, setCompleted] = useState([]);
            const [loading, setLoading] = useState(true);

            // 計算範圍內所有需讀經的日子 (不含週末)
            const validDates = useMemo(() => {
                const res = [];
                let cur = new Date(START_DATE);
                while (cur <= END_DATE) {
                    if (!isWeekend(cur)) res.push(formatDate(cur));
                    cur.setDate(cur.getDate() + 1);
                }
                return res;
            }, []);

            // 初始載入：讀取本地進度 & 抓取 Google Sheets 資料
            useEffect(() => {
                const saved = localStorage.getItem('kc-bible-2026');
                if (saved) setCompleted(JSON.parse(saved));

                const fetchData = async () => {
                    try {
                        const csvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
                        const resp = await fetch(csvUrl);
                        if (!resp.ok) throw new Error('Network response was not ok');
                        const text = await resp.text();
                        
                        // 解析 CSV (處理了欄位中可能包含的雙引號)
                        const rows = text.split('\n').map(row => row.split('","').map(cell => cell.replace(/^"|"$/g, '')));
                        const headers = rows[0];
                        const items = {};
                        
                        for(let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            const item = {};
                            headers.forEach((h, idx) => {
                                if(h) item[h.trim()] = row[idx];
                            });
                            
                            if(item['日期']) {
                                const d = new Date(item['日期']);
                                if(!isNaN(d)) items[formatDate(d)] = item;
                            }
                        }
                        setData(items);
                    } catch (e) {
                        console.error("無法連動雲端試算表：", e);
                        // 若讀取失敗，可在此處加入錯誤提示邏輯
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            // 切換完成狀態
            const toggleFinish = (d) => {
                const next = completed.includes(d) ? completed.filter(x => x !== d) : [...completed, d];
                setCompleted(next);
                localStorage.setItem('kc-bible-2026', JSON.stringify(next));
            };

            // 上下一篇導航
            const navigate = (dir) => {
                const idx = validDates.indexOf(selectedDate);
                if (dir === 'p' && idx > 0) setSelectedDate(validDates[idx-1]);
                if (dir === 'n' && idx < validDates.length - 1) setSelectedDate(validDates[idx+1]);
                window.scrollTo(0, 0);
            };

            // 載入中畫面
            if (loading) return (
                <div className="flex flex-col items-center justify-center h-screen text-nature-600">
                    <i className="fa-solid fa-leaf fa-spin text-5xl mb-4"></i>
                    <p className="font-medium text-lg">正在從雲端載入神的話語...</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* --- 網頁頂部標題 --- */}
                    <header className="bg-gradient-to-br from-nature-800 to-nature-600 text-white py-12 px-4 shadow-xl text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                            <i className="fa-solid fa-seedling text-[20rem] -ml-20 -mt-20"></i>
                        </div>
                        <h1 className="text-4xl md:text-5xl font-bold mb-2 relative z-10">葵涌堂 2026年讀經計劃</h1>
                        <p className="text-nature-100 opacity-90 relative z-10 font-medium">每日清晨，讓聖言滋潤生命</p>
                    </header>

                    <main className="flex-grow py-8 px-4 bg-nature-50/50">
                        {/* === 月曆視圖 === */}
                        {view === 'calendar' ? (
                            <div className="max-w-4xl mx-auto space-y-10">
                                {[5, 6, 7, 8, 9].map(m => ( // 5=六月, 6=七月...
                                    <section key={m} className="bg-white rounded-3xl shadow-sm border border-nature-100 overflow-hidden">
                                        <div className="bg-nature-600 text-white py-3 text-center font-bold text-xl tracking-wider">
                                            2026年 {m+1}月
                                        </div>
                                        <div className="p-4 grid grid-cols-7 gap-2">
                                            {['日','一','二','三','四','五','六'].map(d => (
                                                <div key={d} className="text-center text-gray-400 text-xs font-bold py-2">{d}</div>
                                            ))}
                                            {generateCalendarGrid(2026, m).map((w, wi) => w.map((d, di) => {
                                                if(!d) return <div key={`${wi}-${di}`}></div>;
                                                
                                                const ds = formatDate(d);
                                                const isPlan = validDates.includes(ds);
                                                const isDone = completed.includes(ds);
                                                
                                                return (
                                                    <button 
                                                        key={ds}
                                                        disabled={!isPlan}
                                                        onClick={() => { setSelectedDate(ds); setView('reader'); }}
                                                        className={`h-14 md:h-20 rounded-2xl flex flex-col items-center justify-center transition-all ${
                                                            !isPlan ? 'bg-gray-50 text-gray-200 cursor-not-allowed' :
                                                            isDone ? 'bg-nature-100 text-nature-700 border-2 border-nature-500 font-bold' :
                                                            'bg-white border border-gray-200 hover:border-nature-500 hover:shadow-md'
                                                        }`}
                                                    >
                                                        <span className="text-lg">{d.getDate()}</span>
                                                        {isDone && <i className="fa-solid fa-check-circle text-xs mt-1"></i>}
                                                    </button>
                                                );
                                            }))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        ) : (
                        /* === 閱讀視圖 === */
                            <div className="max-w-3xl mx-auto">
                                {/* 導航列 */}
                                <div className="flex justify-between items-center mb-6">
                                    <button onClick={()=>setView('calendar')} className="bg-white px-5 py-2 rounded-full border border-nature-200 text-nature-700 font-medium hover:bg-nature-50 shadow-sm transition">
                                        <i className="fa-solid fa-calendar-days mr-2"></i> 返回月曆
                                    </button>
                                    <div className="text-gray-500 font-medium text-sm md:text-base">
                                        {new Date(selectedDate).toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}
                                    </div>
                                </div>

                                {/* 經文卡片 */}
                                <article className="bg-white rounded-[2rem] shadow-xl border border-nature-100 overflow-hidden mb-8">
                                    <div className="bg-nature-700 text-white p-8 relative">
                                        <div className="text-nature-200 text-sm font-bold uppercase tracking-widest mb-2">Daily Word</div>
                                        <h2 className="text-3xl md:text-4xl font-serif font-bold relative z-10">
                                            {data[selectedDate]?.['經卷'] ? `${data[selectedDate]?.['經卷']} ${data[selectedDate]?.['章節']}` : '內容準備中'}
                                        </h2>
                                    </div>

                                    <div className="p-6 md:p-8 space-y-10">
                                        {/* 語音播放區塊 */}
                                        {data[selectedDate]?.['語音連結'] && (() => {
                                            const audio = parseExternalLink(data[selectedDate]?.['語音連結'], 'audio');
                                            return (
                                                <div className="bg-nature-50 p-6 rounded-2xl border border-nature-100">
                                                    <h4 className="text-nature-800 font-bold mb-4 flex items-center">
                                                        <i className="fa-solid fa-headphones-simple mr-2"></i> 聆聽經文朗讀
                                                    </h4>
                                                    {audio.type === 'embed' ? (
                                                        <iframe src={audio.url} className="w-full h-16 border-0 rounded-lg"></iframe>
                                                    ) : (
                                                        <audio controls className="w-full"><source src={audio.url}/></audio>
                                                    )}
                                                </div>
                                            );
                                        })()}

                                        {/* 經文內容區塊 */}
                                        <section>
                                            <h4 className="text-nature-700 font-bold mb-4 border-l-4 border-nature-500 pl-3">聖經經文 (和合本修訂版)</h4>
                                            {(() => {
                                                const script = parseExternalLink(data[selectedDate]?.['經文'], 'doc');
                                                if (!script) return <div className="text-gray-400 italic">尚未更新今日經文。</div>;
                                                
                                                return script.type === 'embed' ? (
                                                    <iframe src={script.url} className="w-full h-[500px] border border-gray-100 rounded-xl shadow-inner"></iframe>
                                                ) : (
                                                    <div className="text-lg md:text-xl leading-loose font-serif text-gray-800 whitespace-pre-wrap px-2">
                                                        {data[selectedDate]?.['經文']}
                                                    </div>
                                                );
                                            })()}
                                        </section>

                                        {/* 經文釋義區塊 */}
                                        {data[selectedDate]?.['釋義'] && (
                                            <section className="bg-gray-50 p-6 rounded-2xl border border-gray-100">
                                                <h4 className="text-nature-700 font-bold mb-3 flex items-center">
                                                    <i className="fa-solid fa-pen-nib mr-2"></i> 經文釋義
                                                </h4>
                                                <p className="text-gray-600 leading-relaxed whitespace-pre-wrap text-base md:text-lg">
                                                    {data[selectedDate]?.['釋義']}
                                                </p>
                                            </section>
                                        )}
                                    </div>
                                </article>

                                {/* 底部操作按鈕 */}
                                <div className="flex flex-col md:flex-row gap-4 items-center mb-10">
                                    <button 
                                        onClick={()=>toggleFinish(selectedDate)}
                                        className={`w-full md:flex-1 py-4 rounded-2xl text-lg font-bold shadow-lg transition-all transform hover:scale-[1.02] flex items-center justify-center ${
                                            completed.includes(selectedDate) 
                                            ? 'bg-nature-50 text-nature-700 border-2 border-nature-500' 
                                            : 'bg-nature-600 text-white hover:bg-nature-500'
                                        }`}
                                    >
                                        <i className={`fa-solid mr-2 ${completed.includes(selectedDate) ? 'fa-check-double' : 'fa-circle-check'}`}></i>
                                        {completed.includes(selectedDate) ? '我已完成閱讀' : '標記今日完成'}
                                    </button>
                                    
                                    <div className="flex gap-2 w-full md:w-auto">
                                        <button 
                                            disabled={validDates.indexOf(selectedDate) === 0} 
                                            onClick={()=>navigate('p')} 
                                            className="flex-1 px-6 py-4 rounded-2xl bg-white border border-nature-200 text-nature-700 disabled:opacity-30 hover:bg-nature-50 transition"
                                            title="上一篇"
                                        >
                                            <i className="fa-solid fa-chevron-left mr-2 md:mr-0"></i> <span className="md:hidden">上一篇</span>
                                        </button>
                                        <button 
                                            disabled={validDates.indexOf(selectedDate) === validDates.length - 1} 
                                            onClick={()=>navigate('n')} 
                                            className="flex-1 px-6 py-4 rounded-2xl bg-white border border-nature-200 text-nature-700 disabled:opacity-30 hover:bg-nature-50 transition"
                                            title="下一篇"
                                        >
                                            <span className="md:hidden">下一篇</span> <i className="fa-solid fa-chevron-right ml-2 md:ml-0"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 頁腳 (預留擴充) */}
                    <footer className="py-12 bg-white border-t border-nature-100 text-center text-gray-400 text-sm space-y-4">
                        <p>© 2026 葵涌堂 · 讀經計劃</p>
                        <div className="flex justify-center gap-6">
                            <a href="#" className="hover:text-nature-600 transition"><i className="fa-solid fa-video mr-1"></i> 講道影片</a>
                            <a href="#" className="hover:text-nature-600 transition"><i className="fa-solid fa-book-open mr-1"></i> 更多釋經資源</a>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
